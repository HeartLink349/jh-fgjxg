<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title id="ui-pageTitle">HeartLink | Valentine Special</title>
  
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  
  <style>
    /* --- كود الـ CSS الأصلي كامل وبدون أي حذف --- */
    :root{
      --bg0:#0b1020; --bg1:#0a0f1f; --text:#f8fafc;
      --pink:#ff4da6; --violet:#8b5cf6; --cyan:#22d3ee;
      --shadow: 0 28px 60px rgba(0,0,0,.55);
    }
    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; font-family: "Segoe UI", system-ui, sans-serif; }
    html,body{ height:100%; margin:0; color:var(--text); overflow:hidden; }
    body{
      background:
        radial-gradient(900px 500px at 20% 10%, rgba(255,77,166,.20), transparent 60%),
        radial-gradient(800px 500px at 80% 20%, rgba(139,92,246,.18), transparent 60%),
        radial-gradient(700px 450px at 40% 85%, rgba(34,211,238,.12), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
    }
    .glow{ position:fixed; inset:-100px; pointer-events:none; z-index:-2; filter: blur(60px); opacity:.55; background: radial-gradient(500px 380px at 20% 20%, rgba(255,77,166,.30), transparent 60%), radial-gradient(520px 400px at 85% 25%, rgba(139,92,246,.28), transparent 65%), radial-gradient(420px 320px at 45% 90%, rgba(34,211,238,.18), transparent 60%); animation: floaty 12s ease-in-out infinite alternate; }
    @keyframes floaty{ 0%{ transform: translate3d(-1.5%, -1%, 0) scale(1.02); } 100%{ transform: translate3d(1.8%, 1.2%, 0) scale(1.05); } }
    canvas#hearts{ position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.9; }

    .app{ height:100dvh; display:flex; flex-direction:column; }
    header{ height:86px; display:flex; align-items:center; justify-content:center; padding: 14px 18px; }
    .brand{ display:flex; align-items:center; flex-direction: column; gap:4px; min-width:0; text-align: center; cursor: pointer; }
    .logo{ width:42px; height:42px; border-radius:14px; display:grid; place-items:center; background: linear-gradient(135deg, rgba(255,77,166,.22), rgba(139,92,246,.18)); border: 1px solid rgba(255,255,255,.14); box-shadow: 0 10px 24px rgba(0,0,0,.35); backdrop-filter: blur(14px); margin-bottom: 4px; }
    .logo i{ font-size:18px; background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .brand h1{ margin:0; font-size:15px; font-weight:900; white-space:nowrap; }
    .brand small{ display:block; font-size:10px; letter-spacing:1.4px; text-transform:uppercase; color: rgba(255,255,255,.55); }

    main{ flex:1; padding: 0 16px 18px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .stage{ width:100%; max-width:520px; height: calc(100dvh - 86px - 18px); position:relative; margin: 0 auto; }

    .card{ width:100%; height:100%; border-radius: 30px; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); box-shadow: var(--shadow); backdrop-filter: blur(22px); overflow:hidden; position:absolute; inset:0; transform: translateY(14px) scale(.985); opacity:0; pointer-events:none; transition: .55s cubic-bezier(.2,.8,.2,1); }
    .card.active{ transform: translateY(0) scale(1); opacity:1; pointer-events:auto; }
    .card-inner{ height:100%; overflow-y:auto; overflow-x:hidden; padding: 22px 18px 18px; scrollbar-width:none; display: flex; flex-direction: column; align-items: center; }
    .card-inner::-webkit-scrollbar{ display:none; }

    .hero{ text-align:center; padding: 18px 14px 8px; width: 100%; }
    .hero h2{ margin:0; font-size:28px; font-weight:1000; line-height:1.2; }
    .gradtxt{ background: linear-gradient(135deg, var(--pink), var(--violet), var(--cyan)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; filter: drop-shadow(0 10px 20px rgba(0,0,0,.35)); }
    .hero p{ margin:10px 0 0; font-size:14px; color: rgba(255,255,255,.78); font-weight:800; }

    .login-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; width: 100%; }
    .panel{ padding: 16px; border-radius: 22px; border: 1px solid rgba(255,255,255,.12); background: rgba(10,14,30,.45); backdrop-filter: blur(18px); box-shadow: 0 16px 40px rgba(0,0,0,.35); }
    .field{ display:flex; flex-direction: column; gap:15px; align-items:center; }
    .input{ width: 100%; display:flex; align-items:center; gap:10px; padding: 14px; border-radius: 18px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); }
    input[type="password"]{ width:100%; border:none; outline:none; background:transparent; color: var(--text); font-size:14px; font-weight:800; text-align: center; }

    .btn{ border:none; cursor:pointer; padding: 16px; border-radius: 18px; font-weight:1000; color:#0b1020; background: linear-gradient(135deg, var(--pink), var(--violet)); box-shadow: 0 14px 28px rgba(255,77,166,0.22); transition: transform .12s ease; display:flex; align-items:center; justify-content:center; gap:10px; width: 100%; font-size: 16px; }
    .btn.secondary{ background: rgba(255,255,255,.10); color: var(--text); border:1px solid rgba(255,255,255,.14); box-shadow:none; width: auto; }

    .section-title{ text-align:center; margin: 4px 0 12px; font-size: 18px; font-weight:1000; width: 100%; }
    .timer{ display:grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; width: 100%; }
    .tbox{ padding: 14px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); text-align:center; }
    .tval{ font-size: 22px; font-weight:1000; }
    .tlabel{ font-size: 11px; opacity: 0.7; font-weight:900; }

    .player{ margin-top: 14px; padding: 14px; border-radius: 22px; border: 1px solid rgba(255,255,255,.12); background: rgba(10,14,30,.45); backdrop-filter: blur(18px); width: 100%; }
    .player-top{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
    .track{ display:flex; align-items:center; gap:10px; min-width:0; }
    .disc{ width:42px; height:42px; border-radius:16px; background: linear-gradient(135deg, rgba(255,77,166,.22), rgba(139,92,246,.18)); border: 1px solid rgba(255,255,255,.12); display:grid; place-items:center; }
    .track-title{ font-weight:1000; font-size:13px; }
    .track-sub{ font-size:11px; color: var(--pink); font-weight:800; }
    .pbtn{ width:48px; height:48px; border-radius: 18px; border: 1px solid rgba(255,255,255,.14); background: rgba(255,255,255,.08); color: var(--text); cursor:pointer; display:grid; place-items:center; }
    .bar{ margin-top: 12px; display:flex; align-items:center; gap:10px; }
    .range{ flex:1; height: 10px; border-radius: 999px; background: rgba(255,255,255,.10); position:relative; cursor:pointer; overflow:hidden; }
    .fill{ position:absolute; inset:0 auto 0 0; width:0%; background: linear-gradient(135deg, var(--pink), var(--violet)); }

    .grid{ display:flex; flex-direction: column; gap: 20px; margin-top: 12px; width: 100%; align-items: center; }
    .imgcard{ border-radius: 20px; overflow:hidden; border: 1px solid rgba(255,255,255,.12); background: rgba(255,255,255,.06); box-shadow: 0 18px 40px rgba(0,0,0,.25); width: 100%; max-width: 340px; }
    .imgcard img{ width:100%; height:auto; display:block; }
    .cap{ padding: 12px 10px 15px; font-size: 14px; font-weight:900; color: rgba(255,255,255,.86); text-align:center; }
    .cap .tiny{ display:block; font-size: 11px; color: rgba(255,255,255,.58); }

    .overlay{ position:fixed; inset:0; background: rgba(0,0,0,.8); backdrop-filter: blur(10px); display:flex; align-items:center; justify-content:center; padding: 18px; opacity:0; pointer-events:none; transition: .35s; z-index: 50; }
    .overlay.show{ opacity:1; pointer-events:auto; }
    .letter{ width:min(560px, 100%); border-radius: 28px; background: rgba(10,14,30,.85); border: 1px solid rgba(255,255,255,.14); overflow:hidden; }
    .line{ opacity:0; transform: translateY(10px); transition: .55s; font-size: 18px; font-weight: 900; text-align:center; margin-bottom:10px; }
    .line.reveal{ opacity:1; transform: translateY(0); }
    .toast{ position:fixed; left: 50%; bottom: 16px; transform: translateX(-50%) translateY(20px); padding: 12px 14px; border-radius: 18px; background: var(--pink); color: #000; font-weight:bold; opacity:0; transition: .25s; z-index: 60; }
    .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

    /* --- لوحة التحكم --- */
    #adminPanel { position: fixed; inset: 0; background: rgba(5, 8, 20, 0.98); z-index: 999999; display: none; padding: 20px; backdrop-filter: blur(30px); overflow-y: auto; }
    .admin-card { max-width: 650px; margin: 0 auto; background: rgba(30, 41, 59, 0.7); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
    .admin-nav { display: flex; background: rgba(0,0,0,0.3); overflow-x: auto; scrollbar-width: none; }
    .nav-btn { flex: 1; padding: 18px; border: none; background: none; color: #94a3b8; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.3s; }
    .nav-btn.active { color: var(--pink); background: rgba(255,77,166,0.1); border-bottom: 3px solid var(--pink); }
    .admin-body { padding: 25px; }
    .tab-pane { display: none; animation: fadeIn 0.4s ease; }
    .tab-pane.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .control-row { margin-bottom: 20px; }
    .control-row label { display: block; margin-bottom: 8px; font-size: 12px; color: var(--cyan); font-weight: bold; }
    .input-wrap { display: flex; gap: 8px; }
    .admin-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 12px; border-radius: 12px; color: #fff; outline: none; }
    .save-btn { background: var(--pink); color: #000; border: none; padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .photo-edit-box { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 20px; margin-bottom: 15px; border: 1px dashed rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <canvas id="hearts"></canvas>

  <div id="adminPanel">
      <div class="admin-card">
          <div style="padding:20px; text-align:center; border-bottom: 1px solid rgba(255,255,255,0.1)">
              <h3 style="margin:0; color:var(--pink)">إعدادات الحب الخاصة 🛠️</h3>
          </div>
          <div class="admin-nav">
              <button class="nav-btn active" onclick="openTab(event, 'p-main')">الواجهة</button>
              <button class="nav-btn" onclick="openTab(event, 'p-timer')">العداد</button>
              <button class="nav-btn" onclick="openTab(event, 'p-music')">الأغنية</button>
              <button class="nav-btn" onclick="openTab(event, 'p-gallery')">المعرض</button>
              <button class="nav-btn" onclick="openTab(event, 'p-msg')">الرسالة</button>
          </div>
          <div class="admin-body">
              <div id="p-main" class="tab-pane active">
                  <div class="control-row"><label>العنوان الرئيسي:</label><div class="input-wrap"><input type="text" id="db-heroTitle" class="admin-input"><button class="save-btn" onclick="sv('heroTitle')">حفظ</button></div></div>
                  <div class="control-row"><label>النص الفرعي:</label><div class="input-wrap"><input type="text" id="db-heroSub" class="admin-input"><button class="save-btn" onclick="sv('heroSub')">حفظ</button></div></div>
                  <div class="control-row"><label>كلمة السر:</label><div class="input-wrap"><input type="text" id="db-pass" class="admin-input"><button class="save-btn" onclick="sv('pass')">حفظ</button></div></div>
                  <div class="control-row"><label>تلميح السر:</label><div class="input-wrap"><input type="text" id="db-passHint" class="admin-input"><button class="save-btn" onclick="sv('passHint')">حفظ</button></div></div>
                  <div class="control-row"><label>نص زر الدخول:</label><div class="input-wrap"><input type="text" id="db-enterBtnTxt" class="admin-input"><button class="save-btn" onclick="sv('enterBtnTxt')">حفظ</button></div></div>
              </div>
              <div id="p-timer" class="tab-pane">
                  <div class="control-row"><label>عنوان العداد:</label><div class="input-wrap"><input type="text" id="db-countTitle" class="admin-input"><button class="save-btn" onclick="sv('countTitle')">حفظ</button></div></div>
                  <div class="control-row"><label>تاريخ البداية (YYYY-MM-DD):</label><div class="input-wrap"><input type="text" id="db-startDate" class="admin-input"><button class="save-btn" onclick="sv('startDate')">حفظ</button></div></div>
              </div>
              <div id="p-music" class="tab-pane">
                  <div class="control-row"><label>رابط MP3 المباشر:</label><div class="input-wrap"><input type="text" id="db-audioUrl" class="admin-input"><button class="save-btn" onclick="sv('audioUrl')">حفظ</button></div></div>
                  <div class="control-row"><label>نص الحالة (تحت الأغنية):</label><div class="input-wrap"><input type="text" id="db-loveNote" class="admin-input"><button class="save-btn" onclick="sv('loveNote')">حفظ</button></div></div>
              </div>
              <div id="p-gallery" class="tab-pane">
                  <div id="gallery-inputs"></div>
              </div>
              <div id="p-msg" class="tab-pane">
                  <div class="control-row"><label>نص زر الرسالة:</label><div class="input-wrap"><input type="text" id="db-lastBtnTxt" class="admin-input"><button class="save-btn" onclick="sv('lastBtnTxt')">حفظ</button></div></div>
                  <div class="control-row"><label>عنوان الرسالة:</label><div class="input-wrap"><input type="text" id="db-msgHeader" class="admin-input"><button class="save-btn" onclick="sv('msgHeader')">حفظ</button></div></div>
                  <div class="control-row"><label>محتوى الرسالة (افصل الجمل بـ ,):</label><textarea id="db-msgLines" class="admin-input" rows="4"></textarea><br><button class="save-btn" style="margin-top:10px" onclick="sv('msgLines')">حفظ الكل</button></div>
              </div>
          </div>
          <button onclick="document.getElementById('adminPanel').style.display='none'" style="width:100%; padding:20px; background:none; border:none; color:var(--pink); cursor:pointer; font-weight:bold; border-top:1px solid rgba(255,255,255,0.1)">إغلاق الإعدادات</button>
      </div>
  </div>

  <div class="app">
    <header>
      <div class="brand" onclick="checkAdmin()">
        <div class="logo"><i class="fa-solid fa-heart"></i></div>
        <div>
          <h1 id="ui-brand">HeartLink — Valentine</h1>
          <small>private love page</small>
        </div>
      </div>
    </header>

    <main>
      <div class="stage">
        <section class="card active" id="page1">
          <div class="card-inner">
            <div class="hero">
              <h2><span class="gradtxt" id="ui-heroTitle">عيد الحب</span> 🩷</h2>
              <p id="ui-heroSub">جاهزه يروحي 💕</p>
            </div>
            <div class="login-container">
              <div class="panel">
                <div class="field">
                  <div class="input">
                    <i class="fa-solid fa-lock"></i>
                    <input id="pass" type="password" inputmode="numeric" placeholder="اكتبي الباسورد ي❤" />
                  </div>
                  <button class="btn" id="enterBtn">
                    <span id="ui-enterBtnTxt">دوسي هنا لفتح قلبي</span> <i class="fa-solid fa-arrow-left"></i>
                  </button>
                </div>
              </div>
              <div style="margin-top:20px; font-size:12px; opacity:0.6; text-align:center">💗 لمسة بسيطة… وبعدها هتبدأ الحكاية</div>
            </div>
          </div>
        </section>

        <section class="card" id="page2">
          <div class="card-inner">
            <div class="section-title"><span class="gradtxt" id="ui-countTitle">بداية حكاياتنا</span> ❤😍</div>
            <div class="timer">
              <div class="tbox"><div class="tval" id="yy">0</div><div class="tlabel">سنين</div></div>
              <div class="tbox"><div class="tval" id="mm">0</div><div class="tlabel">شهور</div></div>
              <div class="tbox"><div class="tval" id="dd">0</div><div class="tlabel">أيام</div></div>
              <div class="tbox"><div class="tval" id="hh">0</div><div class="tlabel">ساعات</div></div>
              <div class="tbox"><div class="tval" id="mi">0</div><div class="tlabel">دقايق</div></div>
              <div class="tbox"><div class="tval" id="ss">0</div><div class="tlabel">ثواني</div></div>
            </div>

            <div class="player">
              <div class="player-top">
                <div class="track">
                  <div class="disc"><i class="fa-solid fa-music"></i></div>
                  <div>
                    <div class="track-title">أغنيتنا 🎵</div>
                    <div class="track-sub" id="ui-loveNote">بعشقك 😍❤</div>
                  </div>
                </div>
                <button class="pbtn" id="playBtn"><i class="fa-solid fa-play"></i></button>
              </div>
              <div class="bar"><div class="range" id="seek"><div class="fill" id="fill"></div></div></div>
              <audio id="audio" loop preload="auto"></audio>
            </div>

            <div class="grid" id="ui-gallery"></div>

            <div style="margin: 25px 0; width:100%">
              <button class="btn" id="msgBtn"><span id="ui-lastBtnTxt">دوسي متستعجليش😂❤</span> <i class="fa-solid fa-wand-magic-sparkles"></i></button>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <div class="overlay" id="overlay">
    <div class="letter">
      <div style="padding:15px; display:flex; justify-content:space-between; border-bottom:1px solid rgba(255,255,255,0.1)">
        <div id="ui-msgHeader">رسالة ليكي 💌</div>
        <button onclick="closeMsg()" style="background:none; border:none; color:#fff; font-size:20px; cursor:pointer">&times;</button>
      </div>
      <div id="ui-msgBody" style="padding:20px"></div>
    </div>
  </div>

  <div class="toast" id="toast">الباسورد غلط… جربي تاني يا روحي</div>

  <script>
    /* --- Firebase Init --- */
    const firebaseConfig = {
        apiKey: "AIzaSyCQhPApGNZsaCDPP7LibF9mJdZjXKJGD_g",
        authDomain: "fatma-bday-site.firebaseapp.com",
        databaseURL: "https://fatma-bday-site-default-rtdb.firebaseio.com/",
        projectId: "fatma-bday-site",
        storageBucket: "fatma-bday-site.firebasestorage.app",
        messagingSenderId: "412844539374",
        appId: "1:412844539374:web:715e8096fc76dd8046a2ff"
    };
    firebase.initializeApp(firebaseConfig);

    /* 🚀 المسار الجديد والخاص جداً لضمان عدم تداخل البيانات 🚀 */
    const db = firebase.database().ref('valentine_exclusive_final_shaimaa_v20');

    /* --- Admin Logic --- */
    function openTab(e, id) {
        document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        e.currentTarget.classList.add('active');
    }
    
    function sv(k) { db.child(k).set(document.getElementById('db-'+k).value); }

    let photoHtml = '';
    for(let i=1; i<=7; i++) {
        photoHtml += `<div class="photo-edit-box"><h4>صورة ${i}</h4>
        <input type="text" id="db-img${i}" class="admin-input" placeholder="رابط الصورة" onchange="sv('img${i}')">
        <input type="text" id="db-cap${i}" class="admin-input" placeholder="عنوان الصورة" onchange="sv('cap${i}')">
        <input type="text" id="db-sub${i}" class="admin-input" placeholder="وصف صغير" onchange="sv('sub${i}')"></div>`;
    }
    document.getElementById('gallery-inputs').innerHTML = photoHtml;

    /* --- Sync Logic --- */
    db.on('value', (snap) => {
        const d = snap.val() || {};
        document.getElementById('ui-heroTitle').innerText = d.heroTitle || "عيد الحب";
        document.getElementById('ui-heroSub').innerText = d.heroSub || "جاهزه يروحي 💕";
        document.getElementById('pass').placeholder = d.passHint || "اكتبي الباسورد ي❤";
        document.getElementById('ui-enterBtnTxt').innerText = d.enterBtnTxt || "دوسي هنا لفتح قلبي";
        window.correctPass = d.pass || "22";
        document.getElementById('ui-countTitle').innerText = d.countTitle || "بداية حكاياتنا";
        window.STORY_START = d.startDate || "2022-02-14";
        const audio = document.getElementById('audio');
        if(d.audioUrl && audio.src !== d.audioUrl) audio.src = d.audioUrl;
        document.getElementById('ui-loveNote').innerText = d.loveNote || "بعشقك 😍❤";

        let gHtml = '';
        for(let i=1; i<=7; i++) {
            if(d['img'+i]) gHtml += `<figure class="imgcard"><img src="${d['img'+i]}"><figcaption class="cap">${d['cap'+i]||''}<span class="tiny">${d['sub'+i]||''}</span></figcaption></figure>`;
        }
        document.getElementById('ui-gallery').innerHTML = gHtml;

        document.getElementById('ui-lastBtnTxt').innerText = d.lastBtnTxt || "دوسي متستعجليش😂❤";
        document.getElementById('ui-msgHeader').innerText = d.msgHeader || "رسالة ليكي 💌";
        const lines = (d.msgLines || "").split(',');
        document.getElementById('ui-msgBody').innerHTML = lines.map(l => `<div class="line">${l.trim()}</div>`).join('');

        for(let key in d) { if(document.getElementById('db-'+key)) document.getElementById('db-'+key).value = d[key]; }
    });

    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const fill = document.getElementById("fill");

    document.getElementById("enterBtn").onclick = () => {
        if(document.getElementById("pass").value === window.correctPass) {
            document.getElementById("page1").classList.remove("active");
            document.getElementById("page2").classList.add("active");
            audio.play().catch(()=>{});
        } else {
            const t = document.getElementById("toast");
            t.classList.add("show"); setTimeout(()=>t.classList.remove("show"), 2000);
        }
    };

    function tick() {
        if(!window.STORY_START) return;
        const diff = new Date() - new Date(window.STORY_START);
        const s=1000, m=s*60, h=m*60, d=h*24, mo=d*30.44, y=d*365.25;
        document.getElementById('yy').innerText = Math.floor(diff/y);
        document.getElementById('mm').innerText = Math.floor((diff%y)/mo);
        document.getElementById('dd').innerText = Math.floor((diff%mo)/d);
        document.getElementById('hh').innerText = String(Math.floor((diff%d)/h)).padStart(2,'0');
        document.getElementById('mi').innerText = String(Math.floor((diff%h)/m)).padStart(2,'0');
        document.getElementById('ss').innerText = String(Math.floor((diff%m)/s)).padStart(2,'0');
    }
    setInterval(tick, 1000);

    playBtn.onclick = () => audio.paused ? audio.play() : audio.pause();
    audio.onplay = () => playBtn.innerHTML = '<i class="fa-solid fa-pause"></i>';
    audio.onpause = () => playBtn.innerHTML = '<i class="fa-solid fa-play"></i>';
    audio.ontimeupdate = () => fill.style.width = (audio.currentTime/audio.duration)*100 + "%";

    document.getElementById("msgBtn").onclick = () => {
        document.getElementById("overlay").classList.add("show");
        document.querySelectorAll(".line").forEach((l, i) => setTimeout(() => l.classList.add("reveal"), 400 + i*600));
    };
    function closeMsg() { document.getElementById("overlay").classList.remove("show"); }

    const canvas = document.getElementById("hearts");
    const ctx = canvas.getContext("2d");
    let W, H;
    function res() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    window.onresize = res; res();
    const ha = [];
    function dr() {
        ctx.clearRect(0,0,W,H);
        if(ha.length < 40) ha.push({x:Math.random()*W, y:-20, s:Math.random()*15+10, v:Math.random()*1.5+0.5, a:Math.random()});
        ha.forEach((h, i) => { h.y += h.v; ctx.globalAlpha = h.a; ctx.font = h.s+"px Arial"; ctx.fillText("❤️", h.x, h.y); if(h.y > H) ha.splice(i,1); });
        requestAnimationFrame(dr);
    }
    dr();

    let clicks = 0;
    function checkAdmin() {
        clicks++;
        if(clicks === 5) {
            if(prompt('كلمة السر لفتح التحكم:') === '123') document.getElementById('adminPanel').style.display='block';
            clicks = 0;
        }
        setTimeout(() => clicks = 0, 3000);
    }
  </script>

  window.HEARTLINK_GIFT_ID = "gift-jh-fgjxg";
</script>
